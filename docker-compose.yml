services:
  alpine-nodeps-gcc:
    build:
      context: .
      dockerfile: alpine.Dockerfile
      target: alpine-nodeps-gcc
    shm_size: '2gb'
    container_name: alpine-nodeps-gcc
    volumes:
      - ${DOLPHIN_DIR}:/dolphin
      - ./out/alpine-nodeps-gcc:/out
      - ./ccache.conf:/etc/ccache.conf
      - ${CCACHE_DIR}:/ccache

  alpine-nodeps-clang:
